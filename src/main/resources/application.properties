spring.application.name=moneyManager

#mysqlconfiguration
spring.datasource.url=jdbc:mysql://localhost:3306/moneymanager
spring.datasource.username=root
spring.datasource.password=RO@0045#
server.servlet.context-path=/api/v1.0

#JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Email Configuration (Brevo/Sendinblue)

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.password=${BREVO_USERNAME}
spring.mail.username=${BREVO_PASSWORD}

# Security & Protocol Settings
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Sender Identity
# Removed the space around the '=' for better property parsing
spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL}

money.manager.frontend.url=${MANAGER_FRONTEND_URL}

app.activation.url=${MONEY_MANAGER_BACKEND_URL}
spring.profiles.active = prod

BREVO_FROM_EMAIL=rohitdatir84@gmail.com
MONEY_MANAGER_BACKEND_URL=http://localhost:8080
MANAGER_FRONTEND_URL=http://localhost:3000